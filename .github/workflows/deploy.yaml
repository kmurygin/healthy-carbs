name: Deploy to Render and Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts
          path: backend/target

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [changes, backend-build]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: healthy_carbs_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-artifacts
          path: backend/target

      - name: Run Tests
        run: ./mvnw test

      - name: Test Report
        uses: dorny/test-reporter@v2
        with:
          name: Backend Tests
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify Build
        run: npm run build -- --configuration production

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [changes, frontend-build]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run DOM Tests
        run: npm run test:dom

      - name: Unit Test Report
        uses: dorny/test-reporter@v2
        with:
          name: Frontend Unit Tests
          path: frontend/test-results/unit/junit.xml
          reporter: java-junit

      - name: DOM Test Report
        uses: dorny/test-reporter@v2
        with:
          name: Frontend DOM Tests
          path: frontend/test-results/dom/junit.xml
          reporter: java-junit

  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: [changes, backend-test]
    if: ${{ needs.changes.outputs.backend == 'true' }}

    steps:
      # Render pulls the pushed commit and builds backend/Dockerfile itself
      - name: Trigger Render Deploy Hook
        id: trigger
        run: |
          DEPLOY_ID=$(curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | jq -r '.deploy.id // empty')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      # Deploy hooks are fire-and-forget; poll the API so a failed Render build fails CI.
      # Statuses: live = success; *failed/canceled/deactivated = failure; others = in progress.
      - name: Wait for Render Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
          SERVICE_ID: srv-d93ofstckfvc738tfqkg
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$DEPLOY_ID" ]; then
            echo "::warning::Deploy triggered but status cannot be polled (missing RENDER_API_KEY secret or deploy id) — check the Render dashboard."
            exit 0
          fi
          for i in $(seq 1 60); do
            STATUS=$(curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID" | jq -r '.status')
            echo "[$i/60] deploy status: $STATUS"
            case "$STATUS" in
              live) echo "Deploy is live."; exit 0 ;;
              *failed|canceled|deactivated) echo "::error::Render deploy ended with status: $STATUS"; exit 1 ;;
            esac
            sleep 15
          done
          echo "::error::Timed out after 15 minutes waiting for the Render deploy to go live."
          exit 1

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [changes, frontend-test]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: ./frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Project Settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # vercel build runs the Angular production build via vercel.json buildCommand
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

